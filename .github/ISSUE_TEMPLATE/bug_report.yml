name: Bug report
description: Something in the Disclosure Contact Lookup add-on is broken or behaving unexpectedly
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report! If your issue is "the contact or attribution shown for a host is wrong," that's a **lookup.disclose.io resolution issue**, not add-on code — see the links in the issue chooser.
  - type: input
    id: addon-version
    attributes:
      label: Add-on version
      description: ZAP → Manage Add-ons → Disclosure Contact Lookup
      placeholder: "1.0.0"
    validations:
      required: true
  - type: input
    id: zap-version
    attributes:
      label: ZAP version + OS + JDK
      placeholder: "ZAP 2.16.0, macOS 14, Temurin 17"
    validations:
      required: true
  - type: input
    id: host
    attributes:
      label: Host you looked up (if relevant)
      placeholder: "example.com"
  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: What happened instead
      description: The exact error dialog text, or a screenshot of the result dialog, helps a lot.
    validations:
      required: true
