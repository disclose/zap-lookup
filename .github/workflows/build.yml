name: build

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"   # org.zaproxy.add-on plugin requires Gradle >= 8.13

      - name: Build ZAP add-on
        run: gradle jarZapAddOn --no-daemon --stacktrace

      - name: Locate built add-on
        run: |
          echo "Built .zap files:"
          find build -name "*.zap" -type f -exec ls -lh {} +

      - name: Upload ZAP add-on
        uses: actions/upload-artifact@v7
        with:
          name: zap-lookup-addon
          path: build/**/*.zap
          if-no-files-found: error
